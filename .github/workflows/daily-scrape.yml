name: Daily Scrape

on:
  schedule:
    - cron: '0 7 * * *'  # 09:00 czasu warszawskiego (UTC+2 lato)
  workflow_dispatch:      # możliwość ręcznego uruchomienia z panelu GitHub

permissions:
  contents: write        # potrzebne do push config.yaml po discovery

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalacja zależności
        run: pip install -r requirements.txt

      - name: Discovery nowych produktów
        run: |
          python scraper.py --discover "travellunch"
          python scraper.py --discover "real turmat"
          python scraper.py --discover "trek'n eat"

      - name: Zapisz nowe produkty do repo (jeśli config.yaml się zmienił)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet config.yaml || (git add config.yaml && git commit -m "chore: auto-discovery nowych produktów [skip ci]" && git push)

      - name: Scraping cen
        run: python scraper.py --dry-run --output-json /tmp/prices.json

      - name: Import wyników do API
        run: |
          curl -f -X POST \
            -H "X-Api-Key: ${{ secrets.API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/prices.json \
            https://api.sniegula.com/prices/import
