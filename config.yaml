# =============================================================================
# LIOFILIZATY TRACKER — KONFIGURACJA
# =============================================================================
# Każdy produkt ma:
#   - id: krótki unikalny identyfikator (bez spacji, używany w bazie i wykresach)
#   - name: pełna nazwa do wyświetlania na raporcie
#   - brand: Real Turmat | Trek'n Eat | Travellunch
#   - search_terms: lista fraz, którymi skrypt szuka produktu w każdym sklepie.
#     Skrypt sprawdza każdą frazę po kolei i bierze PIERWSZY pasujący wynik.
#     Im więcej wariantów, tym większa szansa że znajdzie w każdym sklepie.
#   - weight_g: (opcjonalnie) waga produktu — służy do wyliczania ceny za kg
#     i do weryfikacji że scraper złapał właściwy wariant (np. 500g a nie 125g)
# =============================================================================

products:
  # --- PRZYKŁADY — ZASTĄP SWOIMI ---
  # Sławek: wklej tu swoje 10-15 dań. Format poniżej. Im dokładniejsza nazwa
  # i waga, tym pewniejszy match. Po każdym dodaniu możesz uruchomić lokalnie
  # `python scraper.py --dry-run` żeby zobaczyć czy scraper coś znajduje.

  - id: rt_reindeer_stew
    name: "Real Turmat — Gulasz z renifera 500g"
    brand: "Real Turmat"
    weight_g: 500
    search_terms:
      - "Real Turmat Gulasz z renifera 500"
      - "Real Turmat Reindeer Stew"
      - "gulasz renifer real turmat"

  - id: rt_pasta_bolognese
    name: "Real Turmat — Pasta Bolognese 500g"
    brand: "Real Turmat"
    weight_g: 500
    search_terms:
      - "Real Turmat Pasta Bolognese 500"
      - "Real Turmat Spaghetti Bolognese"
      - "real turmat bolognese"

  - id: rt_chicken_curry
    name: "Real Turmat — Kurczak curry 500g"
    brand: "Real Turmat"
    weight_g: 500
    search_terms:
      - "Real Turmat Kurczak curry 500"
      - "Real Turmat Chicken Curry"

  - id: tne_chicken_tikka
    name: "Trek'n Eat — Chicken Tikka Masala"
    brand: "Trek'n Eat"
    weight_g: 160
    search_terms:
      - "Trek'n Eat Chicken Tikka Masala"
      - "Trek n Eat Kurczak Tikka Masala"
      - "treknEat tikka"

  - id: tl_pasta_bolognese
    name: "Travellunch — Pasta Bolognese 125g"
    brand: "Travellunch"
    weight_g: 125
    search_terms:
      - "Travellunch Pasta Bolognese"
      - "Travellunch Makaron Bolognese"

# =============================================================================
# SKLEPY — KONFIGURACJA SCRAPINGU
# =============================================================================
# W prototypie: tylko Skalnik i 8a. Po potwierdzeniu że działa, dołożymy resztę.

shops:
  skalnik:
    enabled: true
    display_name: "Skalnik"
    color: "#C62828"   # ciemnoczerwony na wykresach
  sklep8a:
    enabled: true
    display_name: "8a.pl"
    color: "#1565C0"   # ciemnoniebieski

  # --- SKLEPY DO DODANIA W FAZIE 2 (po potwierdzeniu prototypu) ---
  # wgl:           { enabled: false, display_name: "WGL",         color: "#2E7D32" }
  # sportano:      { enabled: false, display_name: "Sportano",    color: "#6A1B9A" }
  # sewel:         { enabled: false, display_name: "Sewel",       color: "#EF6C00" }
  # turmat_store:  { enabled: false, display_name: "turmat.store",color: "#00695C" }
  # camping4:      { enabled: false, display_name: "4Camping",    color: "#AD1457" }
  # equip:         { enabled: false, display_name: "Equip.pl",    color: "#37474F" }
  # militaria:     { enabled: false, display_name: "Militaria.pl",color: "#5D4037" }

# =============================================================================
# PARAMETRY RAPORTU
# =============================================================================
report:
  history_days: 15          # ile dni wstecz na wykresie
  deal_threshold_pct: 10    # spadek >= X% vs średnia 7-dniowa = "🔥 OKAZJA"
  timezone: "Europe/Warsaw"
